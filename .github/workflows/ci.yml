name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    # Only run on GitHub while the repo is public. Private → skipped (iterate
    # locally with `cargo xtask act`, which sees no repository payload and runs);
    # flipping the repo public makes this run automatically, no edits needed.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (with wasm32-wasip2)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Build (app -> native)
        run: cargo xtask build

      - name: Clippy (native crates)
        run: cargo clippy -p wvm-core -p wvm --release -- -D warnings

      - name: Clippy (wasm app)
        run: cargo clippy -p wvm-app --target wasm32-wasip2 --release -- -D warnings

      - name: Test
        run: cargo test
